<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Tech Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <span class="font-bold text-xl tracking-tight text-slate-800">TechFeed<span class="text-indigo-600">.ai</span></span>
                </div>
                <div class="flex items-center gap-4">
                   <span class="text-sm font-medium text-slate-500">Welcome, <span class="text-indigo-600 font-bold">{{ request.user.username }}</span></span>
    
                   <form action="{% url 'logout' %}" method="post" class="inline">
                       {% csrf_token %}
                       <button type="submit" class="text-sm font-medium text-slate-500 hover:text-red-600 transition-colors">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <div class="mb-8 border-b border-slate-200 pb-5 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Your Recommended Reads</h1>
                <p class="mt-2 text-sm text-slate-500">Curated by your personalized algorithm, cached in Redis for speed.</p>
            </div>
            <span id="loading-status" class="text-sm font-semibold text-indigo-600 animate-pulse">Fetching recommendations...</span>
        </div>

        <div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-auto py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-400">
            Engineered with Django, Celery, Redis, and Tailwind CSS.
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('article-grid');
            const status = document.getElementById('loading-status');

            // Fetch from your local Django API
            fetch('/api/recommendations/')
                .then(response => response.json())
                .then(data => {
                    status.textContent = `Loaded ${data.length} articles`;
                    status.classList.remove('animate-pulse');
                    status.classList.add('text-emerald-600');
                    
                    grid.innerHTML = ''; // Clear loading state

                    data.forEach(article => {
                        // Format the date nicely
                        const dateObj = new Date(article.published_date);
                        const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                        // HTML Template for a single Card
                        const cardHTML = `
                            <article class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full group">
                                <div class="p-6 flex-grow flex flex-col">
                                    <div class="flex justify-between items-start mb-4">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-800">
                                            ${article.source_name}
                                        </span>
                                        <span class="inline-flex items-center gap-1 text-xs font-bold ${article.total_score > 0 ? 'text-amber-500' : 'text-slate-400'}">
                                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                            Score: ${article.total_score}
                                        </span>
                                    </div>
                                    <h3 class="text-xl font-bold text-slate-900 mb-2 leading-tight group-hover:text-indigo-600 transition-colors">
                                        <a href="${article.source_url}" target="_blank" rel="noopener noreferrer" class="focus:outline-none">
                                            <span class="absolute inset-0" aria-hidden="true"></span>
                                            ${article.title}
                                        </a>
                                    </h3>
                                    <p class="text-slate-600 text-sm line-clamp-3 mb-4 flex-grow">
                                        ${article.summary || 'No summary provided by the source.'}
                                    </p>
                                    <div class="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between text-xs text-slate-500">
                                        <time datetime="${article.published_date}">${formattedDate}</time>
                                        <span class="font-medium text-indigo-600 group-hover:underline">Read full article &rarr;</span>
                                    </div>
                                </div>
                            </article>
                        `;
                        grid.insertAdjacentHTML('beforeend', cardHTML);
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    status.textContent = 'Error loading recommendations.';
                    status.classList.remove('animate-pulse', 'text-indigo-600');
                    status.classList.add('text-red-500');
                });
        });
    </script>
</body>
</html>
