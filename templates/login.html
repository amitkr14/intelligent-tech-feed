<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - TechFeed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-md p-8 border border-slate-200">
        <h2 class="text-2xl font-bold text-center text-slate-900 mb-6">Welcome Back</h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-4 [&>p>input]:w-full [&>p>input]:px-3 [&>p>input]:py-2 [&>p>input]:border [&>p>input]:rounded-md">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
                Sign In
            </button>
        </form>
        <p class="mt-4 text-center text-sm text-slate-600">
            Don't have an account? <a href="{% url 'register' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Sign up</a>
        </p>
    </div>
</body>
</html>
